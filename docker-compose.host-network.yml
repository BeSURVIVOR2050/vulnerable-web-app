# Standalone stack: PHP app uses the host network namespace (same TCP/IP stack as the host).
#
# WHEN TO USE
# - Linux Docker engine, or Docker Desktop with WSL2 backend where host networking behaves like Linux.
# - Useful if ICMP/ping from a bridge container still fails (firewall/CAP_NET_RAW limits) and you need
#   ping 8.8.8.8 to behave like `ping` on the host.
#
# LIMITATIONS
# - Docker Desktop for Windows/macOS does NOT implement Linux "host" networking; this often will NOT fix ping there.
#   Use bridge mode (docker-compose.yml + NET_RAW), run Docker in WSL2, or test on a Linux host.
#
# BEFORE SWITCHING from bridge mode: docker compose down (stops this project's containers).
#
# USAGE (with .env in this directory):
#   docker compose -f docker-compose.host-network.yml up -d --build
#
# Browser: http://127.0.0.1:${APP_PORT:-8080}/  (PHP binds directly on that port; no host:container port map)
#
# MySQL: still in a bridge container, published on 127.0.0.1:${MYSQL_PORT:-3307} — app connects via DB_HOST=127.0.0.1.
#
# Troubleshooting (from this directory):
#   docker compose -f docker-compose.host-network.yml exec app ping -c 2 8.8.8.8
#   docker compose -f docker-compose.host-network.yml logs -f app

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PHP_IMAGE: ${PHP_IMAGE:-php:8.2-cli-bookworm}
    network_mode: host
    environment:
      DB_HOST: 127.0.0.1
      DB_PORT: ${MYSQL_PORT:-3307}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD?Copy .env.example to .env and set DB_PASSWORD (match MYSQL_ROOT_PASSWORD)}
      DB_NAME: ${DB_NAME:-secure_db}
      PHP_LISTEN_PORT: ${APP_PORT:-8080}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD?Copy .env.example to .env and set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-secure_db}
    ports:
      - "${MYSQL_BIND:-127.0.0.1}:${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - type: bind
        source: ./secure_db_init.sql
        target: /docker-entrypoint-initdb.d/01-init.sql
        read_only: true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'if [ -z "$$MYSQL_ROOT_PASSWORD" ]; then mysqladmin ping -h 127.0.0.1 -uroot; else mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD"; fi',
        ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 25s
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  mysql_data:
